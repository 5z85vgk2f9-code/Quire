<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#090a09" />
<title>Quire · your next book</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Spectral:ital,wght@0,300;0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#090a09; --bg-2:#0c0e0c;
  --panel:#111411; --panel-2:#0d100d; --panel-3:#151915;
  --ink:#e9e7df; --ink-soft:#c3c5bb; --muted:#868b80; --faint:#575c53;
  --line:rgba(233,231,223,.085); --line-2:rgba(233,231,223,.045);
  --sage:#93a487; --sage-deep:#6f8264; --sage-dim:#3d4838;
  --bronze:#c0a066; --bronze-dim:#5f5236;
  --warn:#a8705f;
  --serif:'Cormorant Garamond',Georgia,serif;
  --body:'Spectral',Georgia,serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --maxw:760px;
  --nav-h:60px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--body);
  color:var(--ink);
  background:var(--bg);
  background-image:
    radial-gradient(120% 80% at 50% -10%, rgba(120,140,110,.10), transparent 55%),
    radial-gradient(140% 90% at 50% 115%, rgba(90,110,85,.09), transparent 60%),
    linear-gradient(180deg, var(--bg), var(--bg-2));
  background-attachment:fixed;
  min-height:100vh;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
.grain{
  position:fixed; inset:0; z-index:60; pointer-events:none;
  opacity:.05; mix-blend-mode:overlay;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%25" height="100%25" filter="url(%23n)"/></svg>');
  background-size:140px 140px;
}
.wrap{max-width:var(--maxw); margin:0 auto; padding:0 20px calc(var(--nav-h) + 34px);}

/* ---- header ---- */
header.top{ padding:30px 0 14px; }
.brand{ display:flex; align-items:baseline; gap:12px; }
.brand h1{
  font-family:var(--serif); font-weight:500; font-size:40px; letter-spacing:.5px;
  margin:0; line-height:1; color:var(--ink);
}
.brand h1 .dot{ color:var(--sage); }
.tagline{
  font-family:var(--mono); font-size:10.5px; letter-spacing:.28em; text-transform:uppercase;
  color:var(--muted); margin:10px 0 0;
}
.tagline b{ color:var(--sage-deep); font-weight:500; }
.rule{ height:1px; background:linear-gradient(90deg, var(--line), transparent); margin:18px 0 4px; }

/* ---- views ---- */
.view{ animation:rise .5s cubic-bezier(.2,.7,.2,1); }
@keyframes rise{ from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
.section-label{
  font-family:var(--mono); font-size:10px; letter-spacing:.26em; text-transform:uppercase;
  color:var(--muted); margin:22px 0 2px; display:flex; align-items:center; gap:10px;
}
.section-label .n{ color:var(--sage-deep); }
.section-label .line{ flex:1; height:1px; background:var(--line-2); }
.view-head{ margin:8px 0 4px; }
.view-head h2{
  font-family:var(--serif); font-weight:500; font-size:27px; letter-spacing:.3px; margin:0; color:var(--ink);
}
.view-head p{ font-size:14.5px; color:var(--ink-soft); margin:6px 0 0; max-width:56ch; }
.view-head p em{ color:var(--sage); font-style:italic; }

/* ---- book card ---- */
.book{
  position:relative; background:linear-gradient(180deg,var(--panel),var(--panel-2));
  border:1px solid var(--line); border-radius:14px; padding:18px 18px 16px; margin-top:14px;
  transition:transform .25s ease, border-color .25s ease;
}
.book:hover{ transform:translateY(-2px); border-color:rgba(147,164,135,.28); }
.book .rank{
  position:absolute; top:16px; right:16px; font-family:var(--mono); font-size:10px;
  letter-spacing:.14em; color:var(--faint);
}
.book .match{
  position:absolute; top:14px; right:16px; text-align:right;
}
.book .match .pct{ font-family:var(--mono); font-size:15px; color:var(--sage); font-weight:500; letter-spacing:.02em; }
.book .match .lbl{ font-family:var(--mono); font-size:8.5px; letter-spacing:.22em; color:var(--faint); text-transform:uppercase; display:block; margin-top:1px; }
.book h3{
  font-family:var(--serif); font-weight:600; font-size:23px; line-height:1.12; margin:0 76px 0 0;
  color:var(--ink); letter-spacing:.2px;
}
.book .meta{ font-family:var(--mono); font-size:11px; letter-spacing:.06em; color:var(--muted); margin:7px 0 0; }
.book .meta .yr{ color:var(--faint); }
.book .blurb{ font-size:14.5px; color:var(--ink-soft); margin:11px 0 0; line-height:1.5; }
.genres{ display:flex; flex-wrap:wrap; gap:6px; margin-top:11px; }
.genre{
  font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--sage-deep); border:1px solid rgba(147,164,135,.22); border-radius:999px; padding:3px 9px;
  background:rgba(147,164,135,.04);
}
.why{ margin-top:13px; padding-top:12px; border-top:1px dashed var(--line); }
.why .because{ font-size:13px; color:var(--muted); font-style:italic; font-family:var(--body); }
.why .because b{ color:var(--sage); font-style:normal; font-weight:500; }
.why-chips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.wchip{
  font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; color:var(--ink-soft);
  background:var(--panel-3); border:1px solid var(--line); border-radius:6px; padding:3px 8px;
}
.wchip::before{ content:"› "; color:var(--sage-deep); }

/* ---- stars ---- */
.rateline{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:14px; }
.rateline .hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); }
.stars{ display:inline-flex; gap:3px; }
.stars button{
  background:none; border:none; padding:2px; cursor:pointer; line-height:0; color:var(--bronze-dim);
  transition:color .12s ease, transform .12s ease;
}
.stars button svg{ width:20px; height:20px; display:block; }
.stars button.on{ color:var(--bronze); }
.stars button:hover{ transform:translateY(-1px); }
.stars.lg button svg{ width:23px; height:23px; }
.dismiss{
  background:none; border:1px solid var(--line); color:var(--muted); font-family:var(--mono);
  font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; padding:6px 11px; border-radius:8px;
  cursor:pointer; transition:.2s;
}
.dismiss:hover{ border-color:rgba(168,112,95,.4); color:var(--warn); }
.card-actions{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:12px; }

/* ---- browse / search ---- */
.searchbar{
  display:flex; align-items:center; gap:10px; background:var(--panel-2); border:1px solid var(--line);
  border-radius:11px; padding:11px 14px; margin-top:14px;
}
.searchbar svg{ width:16px; height:16px; color:var(--muted); flex:none; }
.searchbar input{
  flex:1; background:none; border:none; outline:none; color:var(--ink); font-family:var(--body);
  font-size:15px;
}
.searchbar input::placeholder{ color:var(--faint); }
.filters{ display:flex; flex-wrap:wrap; gap:7px; margin-top:12px; }
.filter{
  font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase;
  color:var(--muted); border:1px solid var(--line); background:transparent; border-radius:999px;
  padding:6px 12px; cursor:pointer; transition:.18s;
}
.filter:hover{ color:var(--ink-soft); border-color:var(--line); }
.filter.active{ color:var(--bg); background:var(--sage); border-color:var(--sage); font-weight:500; }

/* compact list row */
.row{
  display:flex; align-items:center; gap:14px; padding:13px 4px; border-bottom:1px solid var(--line-2);
}
.row .info{ flex:1; min-width:0; }
.row .info h4{ font-family:var(--serif); font-weight:500; font-size:18.5px; margin:0; color:var(--ink); line-height:1.15; }
.row .info .m{ font-family:var(--mono); font-size:10px; letter-spacing:.05em; color:var(--muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row .stars{ flex:none; }
.count{ font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); margin-top:14px; }

/* ---- taste profile ---- */
.stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
.stat{ background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:15px 14px; }
.stat .v{ font-family:var(--serif); font-size:30px; font-weight:500; color:var(--sage); line-height:1; }
.stat .k{ font-family:var(--mono); font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-top:7px; }
.bars{ margin-top:14px; }
.bar{ display:flex; align-items:center; gap:12px; margin:9px 0; }
.bar .lab{ width:118px; flex:none; font-family:var(--mono); font-size:11px; letter-spacing:.04em; color:var(--ink-soft); text-transform:capitalize; }
.bar .track{ flex:1; height:6px; background:var(--panel-3); border-radius:999px; overflow:hidden; }
.bar .fill{ height:100%; background:linear-gradient(90deg,var(--sage-dim),var(--sage)); border-radius:999px; transition:width .6s cubic-bezier(.2,.7,.2,1); }
.authors{ display:flex; flex-wrap:wrap; gap:7px; margin-top:12px; }
.author-chip{ font-family:var(--body); font-size:14px; color:var(--ink-soft); border:1px solid var(--line); border-radius:8px; padding:5px 11px; background:var(--panel-2); }
.author-chip .via{ font-family:var(--mono); font-size:9px; color:var(--bronze); letter-spacing:.1em; margin-left:6px; }

/* ---- onboarding ---- */
.ob-step{ margin-top:22px; }
.chipset{ display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; }
.chip{
  font-family:var(--mono); font-size:11px; letter-spacing:.06em; color:var(--ink-soft);
  border:1px solid var(--line); background:var(--panel-2); border-radius:999px; padding:8px 14px;
  cursor:pointer; transition:.16s; text-transform:capitalize;
}
.chip:hover{ border-color:rgba(147,164,135,.35); }
.chip.sel{ background:rgba(147,164,135,.14); border-color:var(--sage); color:var(--sage); }
.chip.sel::before{ content:"✓ "; color:var(--sage-deep); }

/* ---- buttons ---- */
.btn{
  font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase;
  padding:13px 22px; border-radius:10px; cursor:pointer; border:1px solid var(--sage);
  background:var(--sage); color:var(--bg); font-weight:500; transition:.18s;
}
.btn:hover{ background:var(--sage-deep); border-color:var(--sage-deep); }
.btn.ghost{ background:transparent; color:var(--ink-soft); border-color:var(--line); }
.btn.ghost:hover{ border-color:var(--sage); color:var(--sage); background:transparent; }
.btn.danger{ background:transparent; border-color:rgba(168,112,95,.4); color:var(--warn); }
.btn.danger:hover{ background:rgba(168,112,95,.1); }
.btnrow{ display:flex; gap:10px; flex-wrap:wrap; margin-top:24px; align-items:center; }
.skip{ font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); background:none; border:none; cursor:pointer; padding:8px; }
.skip:hover{ color:var(--ink-soft); }

/* ---- data panel ---- */
.datapanel{ background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:16px; margin-top:14px; }
.datapanel h4{ font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin:0 0 10px; }
textarea{
  width:100%; min-height:96px; background:var(--bg); border:1px solid var(--line); border-radius:8px;
  color:var(--ink-soft); font-family:var(--mono); font-size:11px; padding:11px; resize:vertical; outline:none;
}
textarea:focus{ border-color:var(--sage-dim); }
.tiny{ font-family:var(--mono); font-size:10px; letter-spacing:.06em; color:var(--faint); margin-top:8px; line-height:1.7; }

/* ---- empty ---- */
.empty{ text-align:center; padding:44px 20px; }
.empty .mark{ font-family:var(--serif); font-size:34px; color:var(--sage-dim); font-style:italic; }
.empty p{ font-size:14.5px; color:var(--muted); margin:12px 0 0; max-width:40ch; margin-inline:auto; }

/* ---- bottom nav ---- */
nav.tabs{
  position:fixed; left:0; right:0; bottom:0; z-index:50; height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  display:flex; background:rgba(9,10,9,.86); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
}
nav.tabs button{
  flex:1; background:none; border:none; cursor:pointer; color:var(--faint);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  font-family:var(--mono); font-size:8.5px; letter-spacing:.16em; text-transform:uppercase; transition:color .2s;
}
nav.tabs button svg{ width:20px; height:20px; }
nav.tabs button.active{ color:var(--sage); }
nav.tabs button.active svg{ filter:drop-shadow(0 0 6px rgba(147,164,135,.4)); }

@media (max-width:420px){
  .brand h1{ font-size:34px; } .stats{ gap:8px; } .stat .v{ font-size:26px; }
  .book h3{ font-size:21px; } .bar .lab{ width:96px; }
}
@media (prefers-reduced-motion:reduce){
  *{ animation:none !important; transition:none !important; }
}
/* ---- reader bar & readers ---- */
.readerbar{ display:flex; align-items:center; gap:10px; margin:2px 0 2px; }
.rb-label{ font-family:var(--mono); font-size:9px; letter-spacing:.24em; text-transform:uppercase; color:var(--faint); }
.rb-name{ font-family:var(--mono); font-size:11px; letter-spacing:.05em; color:var(--sage); background:rgba(147,164,135,.07); border:1px solid rgba(147,164,135,.22); border-radius:999px; padding:5px 12px; cursor:pointer; transition:.18s; }
.rb-name.static{ background:none; border-color:var(--line); color:var(--ink-soft); }
.rb-name:hover{ border-color:var(--sage); }
.rb-caret{ color:var(--sage-deep); font-size:9px; }
.mini-actions{ display:flex; gap:8px; }
.reader-row{ display:flex; align-items:center; gap:10px; padding:14px 12px; border:1px solid var(--line); border-radius:12px; margin-top:10px; background:var(--panel-2); transition:.2s; }
.reader-row.active{ border-color:rgba(147,164,135,.4); background:rgba(147,164,135,.05); }
.reader-pick{ flex:1; text-align:left; background:none; border:none; cursor:pointer; padding:0; min-width:0; }
.reader-pick .rn{ font-family:var(--serif); font-weight:500; font-size:19px; color:var(--ink); display:block; }
.reader-pick .cur{ font-family:var(--mono); font-size:8px; letter-spacing:.2em; text-transform:uppercase; color:var(--sage); border:1px solid rgba(147,164,135,.3); border-radius:999px; padding:1px 7px; margin-left:8px; vertical-align:middle; }
.reader-pick .rmeta{ font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:3px; display:block; }
.reader-tools{ display:flex; gap:6px; flex:none; }
details.datapanel summary{ outline:none; }
details.datapanel summary::-webkit-details-marker{ display:none; }
details.datapanel[open] > summary{ color:var(--sage); }

:focus-visible{ outline:2px solid var(--sage); outline-offset:2px; border-radius:4px; }
</style>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>Quire<span class="dot">.</span></h1>
    </div>
    <p class="tagline">a reading instrument · <b>find anyone their next book</b></p>
    <div class="rule"></div>
  </header>
  <main id="view" role="main"></main>
</div>

<nav class="tabs" id="tabs" aria-label="Sections"></nav>

<script src="books.js"></script>
<script src="app.js"></script>
</body>
</html>
